backend:
  name: github
  repo: lauri123/laidna.ee
  branch: main

# assets/ (not static/) so Hugo's asset pipeline can generate the responsive
# srcset variants — a file in static/images would be served full-size only.
media_folder: assets/images
public_folder: /images

# Re-encode every uploaded/pasted raster image in the browser before commit.
# JPEG (not webp/avif) so saved copies open anywhere; the canvas re-encode also
# strips EXIF (GPS, camera) — otherwise a direct file upload keeps it verbatim.
media_libraries:
  all:
    transformations:
      raster_image:
        format: jpeg
        quality: 85
        width: 4000
        height: 4000

publish_mode: simple

_field_defs: &post_fields
  - { label: "Title", name: "title", widget: "string" }
  - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
  - { label: "Draft", name: "draft", widget: "boolean", default: true }
  - { label: "Tags", name: "tags", widget: "list", default: [], required: false }
  - { label: "Summary", name: "summary", widget: "string", required: false }
  - { label: "Cover image", name: "cover", widget: "image", required: false }
  - { label: "Body", name: "body", widget: "markdown" }

collections:
  - name: smart-home
    label: "Smart Home"
    folder: content/smart-home
    create: true
    slug: "{{slug}}"
    format: toml-frontmatter
    fields: *post_fields

  - name: electronics
    label: "DIY Electronics"
    folder: content/electronics
    create: true
    slug: "{{slug}}"
    format: toml-frontmatter
    fields: *post_fields

  - name: 3d-printing
    label: "3D Printing & Modelling"
    folder: content/3d-printing
    create: true
    slug: "{{slug}}"
    format: toml-frontmatter
    fields: *post_fields

  - name: dev-ai
    label: "Development & AI"
    folder: content/dev-ai
    create: true
    slug: "{{slug}}"
    format: toml-frontmatter
    fields: *post_fields

  - name: homelab-proxmox
    label: "Homelab — Proxmox"
    folder: content/homelab/proxmox
    create: true
    slug: "{{slug}}"
    format: toml-frontmatter
    fields: *post_fields

  - name: homelab-networking
    label: "Homelab — Networking"
    folder: content/homelab/networking
    create: true
    slug: "{{slug}}"
    format: toml-frontmatter
    fields: *post_fields

  - name: rc-drones
    label: "RC & Drones"
    folder: content/rc-drones
